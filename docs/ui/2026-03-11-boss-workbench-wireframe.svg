  <text x="984" y="990" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#4B5563">作者B · 稳定 · 通过率高</text>
  <text x="984" y="1018" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#4B5563">编辑A · 严格 · 速度慢</text>
  <text x="984" y="1046" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#4B5563">编辑B · 快速 · 标准宽松</text>
  <text x="984" y="1074" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#4B5563">研究员A / B · 用户 / 竞品双线</text>
  <rect x="1280" y="892" width="430" height="168" rx="18" fill="#FFF7ED" stroke="#F59E0B"/>
  <text x="1304" y="926" font-family="Inter, Noto Sans SC, sans-serif" font-size="16" font-weight="600" fill="#92400E">扩编申请</text>
  <text x="1304" y="958" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#78350F">岗位：作者 · 原因：高质量内容产能不足</text>
  <text x="1304" y="986" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#78350F">候选人：3 名 · 推荐：风格补位型作者</text>
  <rect x="1304" y="1008" width="120" height="38" rx="12" fill="#111827"/>
  <text x="1333" y="1032" font-family="Inter, Noto Sans SC, sans-serif" font-size="13" fill="#FFFFFF">查看 shortlist</text>
  <rect x="1280" y="1084" width="430" height="168" rx="18" fill="#ECFDF5" stroke="#10B981"/>
  <text x="1304" y="1118" font-family="Inter, Noto Sans SC, sans-serif" font-size="16" font-weight="600" fill="#065F46">候选人卡</text>
  <text x="1304" y="1150" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#065F46">候选人 C · 作者岗 · 擅长深度长文</text>
  <text x="1304" y="1178" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#065F46">速度 6 / 质量 9 / 协作 8 / 风险：保守</text>
  <text x="1304" y="1206" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#065F46">附：试稿样本 + 预计成本档位</text>

  <!-- callouts -->
  <rect x="60" y="1305" width="1680" height="28" rx="10" fill="#E5E7EB"/>
  <text x="80" y="1324" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#374151">核心产品判断：它是 “Boss Operating System”，不是一个普通 dashboard，也不是一个 agent 群聊界面。</text>
