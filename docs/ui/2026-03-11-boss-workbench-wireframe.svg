  <text x="364" y="926" font-family="Inter, Noto Sans SC, sans-serif" font-size="16" font-weight="600" fill="#111827">交付物预览</text>
  <rect x="364" y="952" width="452" height="210" rx="14" fill="#FFFFFF" stroke="#D1D5DB" stroke-dasharray="6 6"/>
