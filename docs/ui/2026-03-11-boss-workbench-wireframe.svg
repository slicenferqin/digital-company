  <rect x="364" y="1182" width="100" height="42" rx="12" fill="#111827"/>
  <text x="397" y="1209" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#FFFFFF">通过</text>
  <rect x="478" y="1182" width="100" height="42" rx="12" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="509" y="1209" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#111827">打回</text>
  <rect x="592" y="1182" width="100" height="42" rx="12" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="619" y="1209" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#111827">批注</text>
  <rect x="706" y="1182" width="110" height="42" rx="12" fill="#FFFFFF" stroke="#D1D5DB"/>
  <text x="728" y="1209" font-family="Inter, Noto Sans SC, sans-serif" font-size="14" fill="#111827">设为模板</text>

  <!-- Screen 4 -->
  <rect x="930" y="750" width="810" height="540" rx="24" fill="#FFFDFC" stroke="#D1D5DB" stroke-width="2"/>
